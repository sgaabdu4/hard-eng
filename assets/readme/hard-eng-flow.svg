<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Hard Eng workflow</title>
  <desc id="desc">Direct work handles small clear changes. Serious work moves through Plan, a Build and Verify loop, Ship, and conditional Learn, with user approval at product and publication boundaries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity=".35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7dd3fc"/>
    </marker>
    <style>
      .box { fill:#10243b; stroke:#2f5f7d; stroke-width:2; rx:18; filter:url(#shadow) }
      .main { fill:#0f3242; stroke:#38bdf8 }
      .approval { fill:#3a2d18; stroke:#fbbf24 }
      .label { fill:#f8fafc; font:700 22px system-ui,sans-serif }
      .sub { fill:#b9c9d8; font:15px system-ui,sans-serif }
      .tiny { fill:#fcd34d; font:600 14px system-ui,sans-serif }
      .line { fill:none; stroke:#7dd3fc; stroke-width:3; marker-end:url(#arrow) }
    </style>
  </defs>
  <rect width="1200" height="460" rx="28" fill="url(#bg)"/>
  <text x="60" y="62" class="label" font-size="28">One entry point. Exact state. Current proof.</text>
  <text x="60" y="91" class="sub">Small work stays direct; serious work earns each transition.</text>
  <rect x="60" y="137" width="210" height="112" class="box"/>
  <text x="87" y="181" class="label">Direct</text>
  <text x="87" y="210" class="sub">small · clear · bounded</text>
  <text x="87" y="232" class="sub">proportionate proof</text>
  <rect x="330" y="137" width="210" height="112" class="box main"/>
  <text x="357" y="181" class="label">Plan</text>
  <text x="357" y="210" class="sub">decisions · flow · risk</text>
  <text x="357" y="232" class="sub">coded UI preview</text>
  <rect x="600" y="137" width="230" height="112" class="box main"/>
  <text x="627" y="181" class="label">Build ⇄ Verify</text>
  <text x="627" y="210" class="sub">vertical slices</text>
  <text x="627" y="232" class="sub">proof on the same tree</text>
  <rect x="890" y="137" width="210" height="112" class="box main"/>
  <text x="917" y="181" class="label">Ship</text>
  <text x="917" y="210" class="sub">one check registry</text>
  <text x="917" y="232" class="sub">signed candidate</text>
  <path d="M540 193 H590" class="line"/>
  <path d="M830 193 H880" class="line"/>
  <rect x="352" y="302" width="166" height="72" class="box approval"/>
  <text x="376" y="332" class="tiny">USER APPROVAL</text>
  <text x="376" y="355" class="sub">plan + direction</text>
  <path d="M435 292 V258" class="line"/>
  <rect x="912" y="302" width="166" height="72" class="box approval"/>
  <text x="936" y="332" class="tiny">USER APPROVAL</text>
  <text x="936" y="355" class="sub">final evidence</text>
  <path d="M995 292 V258" class="line"/>
  <rect x="620" y="302" width="190" height="72" class="box"/>
  <text x="645" y="332" class="label">Learn</text>
  <text x="645" y="355" class="sub">admitted evidence only</text>
  <path d="M715 258 V292" class="line"/>
  <path d="M610 338 H570 V270 H600" class="line"/>
  <text x="60" y="420" class="sub">Compaction resumes the exact phase · unrelated tasks receive zero workflow context · checks are model-free</text>
</svg>
