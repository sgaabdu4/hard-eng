name: no-mistakes-required

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  issue_comment:
    types:
      - created
      - edited
  pull_request_review:
    types:
      - submitted
      - edited

permissions:
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  no-mistakes-required:
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Require maintainer-owned no-mistakes evidence
        uses: actions/github-script@v7
        env:
          REQUIRED_AUTHOR: sgaabdu4
        with:
          script: |
            const requiredAuthor = process.env.REQUIRED_AUTHOR;
            const prNumber = context.payload.pull_request?.number ?? context.payload.issue?.number;
            if (!prNumber) {
              core.setFailed('Could not determine pull request number.');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const headSha = pr.head.sha;
            const shortHead = headSha.slice(0, 7);
            const passedEvidencePattern = /No open no-mistakes findings|outcome:\s*(?:checks-passed|passed)/i;
            const managedStart = '<!-- nm-pr-evidence:start -->';
            const managedEnd = '<!-- nm-pr-evidence:end -->';
            const runUrl = `${process.env.GITHUB_SERVER_URL || 'https://github.com'}/${owner}/${repo}/actions/runs/${context.runId}`;

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function managedBlocks(body) {
              const pattern = new RegExp(`${escapeRegExp(managedStart)}[\\s\\S]*?${escapeRegExp(managedEnd)}`, 'gi');
              return [...String(body || '').matchAll(pattern)].map((match) => match[0]);
            }

            function hasCurrentHead(text) {
              const value = String(text || '');
              return value.includes(headSha) || value.includes(shortHead);
            }

            function hasCurrentEvidence(text) {
              return hasCurrentHead(text) && passedEvidencePattern.test(String(text || ''));
            }

            function changedPatchLines(file) {
              return String(file.patch || '')
                .split('\n')
                .filter((line) => /^[+-]/.test(line) && !/^(?:\+\+\+|---)/.test(line));
            }

            function isSkillSubmoduleGitlinkUpdate(file) {
              const parts = String(file.filename || '').split('/');
              const patch = String(file.patch || '').trim();
              return file.status === 'modified'
                && parts.length === 3
                && parts[0] === 'vendor'
                && parts[1] === 'skill-upstreams'
                && /^@@ -1 \+1 @@\n-Subproject commit [0-9a-f]{40}\n\+Subproject commit [0-9a-f]{40}$/i.test(patch);
            }

            function parseAlphaVersion(value) {
              const match = String(value || '').match(/^(0\.\d+\.\d+)-alpha\.(\d+)$/);
              if (!match) return null;
              const alpha = Number(match[2]);
              if (!Number.isSafeInteger(alpha)) return null;
              return { value: match[0], core: match[1], alpha };
            }

            function parseVersionFileBump(file) {
              const lines = changedPatchLines(file);
              if (file.filename !== 'VERSION' || file.status !== 'modified' || lines.length !== 2) return null;
              const removed = lines[0].match(/^-((?:0\.\d+\.\d+-alpha\.\d+))$/);
              const added = lines[1].match(/^\+((?:0\.\d+\.\d+-alpha\.\d+))$/);
              const from = parseAlphaVersion(removed?.[1]);
              const to = parseAlphaVersion(added?.[1]);
              const pullNumber = Number(prNumber);
              if (!from || !to || from.value === to.value || from.core !== to.core) return null;
              if (!Number.isSafeInteger(pullNumber) || to.alpha !== Math.max(from.alpha + 1, pullNumber)) return null;
              return { from: from.value, to: to.value };
            }

            function isVersionFileBump(file) {
              return Boolean(parseVersionFileBump(file));
            }

            function badgeVersion(match) {
              return `${match[1]}-alpha.${match[2]}`;
            }

            function parseReadmeVersionBump(file) {
              let lines = changedPatchLines(file);
              const policyLines = lines.filter((line) => line.startsWith('-| `no-mistakes-required` |') || line.startsWith('+| `no-mistakes-required` |'));
              if (policyLines.length > 0) {
                if (policyLines.length !== 2
                  || policyLines[0] !== '-| `no-mistakes-required` | The PR contains passed no-mistakes evidence from `sgaabdu4` for the current head before review or merge. Owner PRs can use the managed PR body block from `integrations/no-mistakes/scripts/repair-pr-evidence.mjs` when it says `No open no-mistakes findings`; outside PRs need a `sgaabdu4` PR comment or review with the current head SHA plus `No open no-mistakes findings` or `outcome: checks-passed`. Same-repo owner PRs that only update `vendor/skill-upstreams/<name>` gitlinks, plus the automated `VERSION` and README alpha-version bump, pass this check without no-mistakes evidence. |'
                  || policyLines[1] !== '+| `no-mistakes-required` | Code/config PRs require passed no-mistakes evidence from `sgaabdu4` for the current head before review or merge. Owner PRs can use the managed PR body block from `integrations/no-mistakes/scripts/repair-pr-evidence.mjs` when it says `No open no-mistakes findings`; outside PRs need a `sgaabdu4` PR comment or review with the current head SHA plus `No open no-mistakes findings` or `outcome: checks-passed`. Same-repo owner PRs that update pinned skill gitlinks and exact deterministic refresh companions use deterministic vendor-integrity and CI proof instead; matching `VERSION` and README alpha-version bumps may be omitted, but if included they must pass the version contract. Other code/config changes still require no-mistakes. |') {
                  return null;
                }
                lines = lines.filter((line) => !line.startsWith('-| `no-mistakes-required` |') && !line.startsWith('+| `no-mistakes-required` |'));
              }
              if (file.filename !== 'README.md' || file.status !== 'modified' || lines.length !== 4) return null;
              const removedBadge = lines[0].match(/^-\[!\[Version\]\(https:\/\/img\.shields\.io\/badge\/version-(0\.\d+\.\d+)--alpha\.(\d+)-f59e0b\)\]\(#versioning\)$/);
              const addedBadge = lines[1].match(/^\+\[!\[Version\]\(https:\/\/img\.shields\.io\/badge\/version-(0\.\d+\.\d+)--alpha\.(\d+)-f59e0b\)\]\(#versioning\)$/);
              const removedCurrent = lines[2].match(/^-Current version: `(0\.\d+\.\d+-alpha\.\d+)` from \[VERSION\]\(VERSION\)\. The matching Git tag is `v(0\.\d+\.\d+-alpha\.\d+)`\.$/);
              const addedCurrent = lines[3].match(/^\+Current version: `(0\.\d+\.\d+-alpha\.\d+)` from \[VERSION\]\(VERSION\)\. The matching Git tag is `v(0\.\d+\.\d+-alpha\.\d+)`\.$/);
              if (!removedBadge || !addedBadge || !removedCurrent || !addedCurrent) return null;
              const from = removedCurrent[1];
              const to = addedCurrent[1];
              if (removedCurrent[2] !== from || addedCurrent[2] !== to) return null;
              if (badgeVersion(removedBadge) !== from || badgeVersion(addedBadge) !== to || from === to) return null;
              return { from, to };
            }

            function isReadmeVersionBump(file) {
              return Boolean(parseReadmeVersionBump(file));
            }

            function isDeterministicRefreshCompanionFile(file) {
              if (file.status !== 'modified') return false;
              const patch = String(file.patch || '').trim();
              if (file.filename === 'skills/sentry-sdk-setup/SKILL.md') {
                return changedPatchLines(file).join('\n') === [
                  '-`../../vendor/skill-upstreams/sentry-for-ai/skills/sentry-sdk-setup/SKILL.md`.',
                  '+`../../vendor/skill-upstreams/sentry-for-ai/skills/sentry-get-started/SKILL.md`.',
                ].join('\n');
              }
              if (file.filename === 'skills/sentry-workflow/references/upstream-routing.md') {
                return changedPatchLines(file).join('\n') === [
                  '-| SDK installation or basic error monitoring | `../../../vendor/skill-upstreams/sentry-for-ai/skills/sentry-sdk-setup/SKILL.md` |',
                  '+| SDK installation or basic error monitoring | `../../../vendor/skill-upstreams/sentry-for-ai/skills/sentry-get-started/SKILL.md` |',
                ].join('\n');
              }
              if (file.filename === 'PRODUCT.md') {
                return changedPatchLines(file).join('\n') === [
                  '-  submodule-only exemption, and `integrations/no-mistakes` guardrail helpers',
                  '+  exemption for pure gitlink refreshes and exact deterministic refresh',
                  '+  companions, plus `integrations/no-mistakes` guardrail helpers',
                ].join('\n');
              }
              if (file.filename === 'tests/setup-uninstall-contract.test.mjs') {
                return changedPatchLines(file).join('\n') === [
                  "-assertIncludes(readme, 'The PR contains passed no-mistakes evidence from `sgaabdu4` for the current head before review or merge.', 'README must document owner-authored no-mistakes evidence');",
                  "+assertIncludes(readme, 'Code/config PRs require passed no-mistakes evidence from `sgaabdu4` for the current head before review or merge.', 'README must document owner-authored no-mistakes evidence');",
                ].join('\n');
              }
              if (file.filename === 'tests/agents-md-contract.test.mjs') {
                return changedPatchLines(file).join('\n') === [
                  "-assertIncludes(readmeText, '| `no-mistakes-required` | The PR contains passed no-mistakes evidence from `sgaabdu4` for the current head before review or merge.');",
                  "-assertIncludes(readmeText, 'Same-repo owner PRs that only update `vendor/skill-upstreams/<name>` gitlinks, plus the automated `VERSION` and README alpha-version bump, pass this check without no-mistakes evidence.');",
                  "+assertIncludes(readmeText, '| `no-mistakes-required` | Code/config PRs require passed no-mistakes evidence from `sgaabdu4` for the current head before review or merge.');",
                  "+assertIncludes(readmeText, 'Same-repo owner PRs that update pinned skill gitlinks and exact deterministic refresh companions use deterministic vendor-integrity and CI proof instead; matching `VERSION` and README alpha-version bumps may be omitted, but if included they must pass the version contract. Other code/config changes still require no-mistakes.');",
                ].join('\n');
              }
              if (file.filename === 'tests/no-mistakes-required-workflow.test.mjs') {
                return patch.includes('result = await runCase({ files: [submoduleFile] });')
                  && patch.includes("filename: '.github/workflows/no-mistakes-required.yml'")
                  && patch.includes('Missing passed no-mistakes evidence');
              }
              if (file.filename === '.github/workflows/no-mistakes-required.yml') {
                const changed = changedPatchLines(file);
                const removed = changed.filter((line) => line.startsWith('-'));
                const hunkCount = patch.split('\n').filter((line) => line.startsWith('@@')).length;
                return hunkCount === 5
                  && removed.length === 6
                  && removed.every((line) => [
                    '-              const lines = changedPatchLines(file);',
                    '-                || isReadmeVersionBump(file);',
                    '-                && Boolean(versionBump)',
                    '-                && Boolean(readmeVersionBump)',
                    '-                && versionBump.from === readmeVersionBump.from',
                    '-                && versionBump.to === readmeVersionBump.to',
                  ].includes(line))
                  && changed.some((line) => line.includes('const hasVersionMetadata = files.some'))
                  && changed.some((line) => line.includes('const releaseMetadataValid = !hasVersionMetadata'))
                  && changed.some((line) => line.includes('&& releaseMetadataValid'));
              }
              return false;
            }

            function isAllowedSubmoduleOnlyFile(file) {
              return isSkillSubmoduleGitlinkUpdate(file)
                || isVersionFileBump(file)
                || isReadmeVersionBump(file)
                || isDeterministicRefreshCompanionFile(file);
            }

            async function isMaintainerSubmoduleOnlyUpdate() {
              if (pr.user?.login !== requiredAuthor) return false;
              if (pr.head.repo?.full_name !== `${owner}/${repo}`) return false;
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              });
              const hasSubmoduleGitlink = files.some(isSkillSubmoduleGitlinkUpdate);
              const versionBump = files.map(parseVersionFileBump).find(Boolean);
              const readmeVersionBump = files.map(parseReadmeVersionBump).find(Boolean);
              const hasVersionMetadata = files.some((file) => file.filename === 'VERSION'
                || (file.filename === 'README.md'
                  && changedPatchLines(file).some((line) => !line.startsWith('-| `no-mistakes-required` |') && !line.startsWith('+| `no-mistakes-required` |'))));
              const releaseMetadataValid = !hasVersionMetadata
                ? !versionBump && !readmeVersionBump
                : Boolean(versionBump)
                  && Boolean(readmeVersionBump)
                  && versionBump.from === readmeVersionBump.from
                  && versionBump.to === readmeVersionBump.to;
              return files.length > 0
                && hasSubmoduleGitlink
                && releaseMetadataValid
                && files.every(isAllowedSubmoduleOnlyFile);
            }

            async function setStatus(state, description) {
              try {
                await github.rest.repos.createCommitStatus({
                  owner,
                  repo,
                  sha: headSha,
                  state,
                  context: 'no-mistakes-required',
                  description,
                  target_url: runUrl,
                });
              } catch (error) {
                core.warning(`Could not write commit status for ${headSha}: ${error.message}`);
              }
            }

            let source = '';
            if (pr.user?.login === requiredAuthor && managedBlocks(pr.body).some(hasCurrentEvidence)) {
              source = 'PR body';
            }

            if (!source && await isMaintainerSubmoduleOnlyUpdate()) {
              await setStatus('success', 'Maintainer submodule-only update; no no-mistakes evidence required.');
              core.info(`Maintainer submodule-only update accepted for ${headSha}.`);
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            if (!source && comments.some((comment) => comment.user?.login === requiredAuthor && hasCurrentEvidence(comment.body))) {
              source = 'PR comment';
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });
            if (!source && reviews.some((review) => review.user?.login === requiredAuthor && hasCurrentEvidence(review.body))) {
              source = 'PR review';
            }

            if (source) {
              await setStatus('success', `Current-head evidence found in ${source}.`);
              core.info(`Maintainer-owned no-mistakes evidence found for ${headSha} in ${source}.`);
              return;
            }

            await setStatus('failure', `Missing current-head passed evidence from ${requiredAuthor}.`);
            core.setFailed(`Missing passed no-mistakes evidence from ${requiredAuthor} for ${headSha}. Run no-mistakes, then add the managed PR evidence block or a PR comment/review that includes the current head SHA and a passed marker.`);
