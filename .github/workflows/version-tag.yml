name: version-tag

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  create-alpha-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag for VERSION
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          if ! [[ "$version" =~ ^0\.[0-9]+\.[0-9]+-alpha\.[0-9]+$ ]]; then
            echo "VERSION must stay in 0.x.x-alpha.N format before v1.0.0; got: $version" >&2
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
            tagged_commit="$(git rev-list -n 1 "$tag")"
            head_commit="$(git rev-parse HEAD)"
            if [ "$tagged_commit" = "$head_commit" ]; then
              echo "Tag ${tag} already exists for this commit."
              exit 0
            fi
            echo "Tag ${tag} already exists for ${tagged_commit}; refusing to reuse it for ${head_commit}." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release ${tag}"
          git push origin "refs/tags/${tag}"
