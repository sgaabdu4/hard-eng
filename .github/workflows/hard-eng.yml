name: hard-eng

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

permissions:
  contents: read

concurrency:
  group: hard-eng-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out candidate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Run canonical Hard Eng registry
        run: node plugins/hard-eng/runtime/he.mjs check --all
