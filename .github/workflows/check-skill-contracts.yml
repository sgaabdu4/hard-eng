name: Check skill contracts

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check skill contracts
        run: python3 skills/deterministic-checks/scripts/bounded_run.py --timeout 240 -- python3 scripts/check-skill-contracts.py

      - name: Check DESIGN.md
        run: node skills/deterministic-checks/scripts/check-design-md.js

      - name: Check managed skills
        run: node scripts/check-managed-skills.js
