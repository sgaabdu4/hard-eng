name: Check skill contracts

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check skill contracts
        run: python3 scripts/check-skill-contracts.py

      - name: Check managed skills
        run: node scripts/check-managed-skills.js
